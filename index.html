<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人專業介紹 | 個人特色網頁</title>
    <style>
        /* 基礎設定 */
        :root {
            --linkedin-blue: #0a66c2;
            --bg-gray: #f3f2ef;
            --text-dark: #191919;
            --text-gray: #666666;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* 區塊通用樣式 */
        section {
            background: var(--white);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
        }

        h2 {
            font-size: 1.25rem;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 10px;
            margin-top: 0;
        }

        /* Header 區塊 */
        header {
            position: relative;
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
        }

        .banner {
            height: 150px;
            background: linear-gradient(135deg, #0a66c2 0%, #004182 100%);
        }

        .profile-info {
            padding: 0 24px 24px 24px;
            margin-top: -50px;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--white);
            background: #ccc;
            object-fit: cover;
        }

        .name { font-size: 1.5rem; font-weight: bold; margin: 10px 0 5px 0; }
        .headline { font-size: 1.1rem; color: var(--text-gray); margin-bottom: 10px; }
        .location { font-size: 0.9rem; color: var(--text-gray); }

        /* 經歷與技能樣式 */
        .exp-item { margin-bottom: 20px; }
        .
