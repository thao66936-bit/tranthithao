<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人專業履歷 | LinkedIn Style</title>
    <style>
        /* 全域設定 */
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Fira Sans", Ubuntu, Oxygen, "Oxygen Sans", Cantarell, "Droid Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Lucida Grande", Helvetica, Arial, sans-serif;
            background-color: #f3f2ef; /* LinkedIn 背景色 */
            margin: 0;
            color: rgba(0,0,0,0.9);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 10px;
        }

        /* 頂部卡片 (Header) */
        header {
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .banner {
            height: 150px;
            background: linear-gradient(to right, #a0b4b7, #dbe7e9); /* 預設橫幅色 */
        }

        .profile-section {
            padding: 0 24px 24px;
            position: relative;
        }

        /* 這裡定義了 .profile-photo class 的樣式 */
        .profile-photo {
            width: 152px;
            height: 152px;
            border-radius: 50%;
            border: 4px solid #fff;
            background-color: #eee;
            margin-top: -76px; /* 向上偏移一半 */
            object-fit: cover;
            display: block; /* 確保圖片正確顯示 */
        }

        .info {
            margin-top: 15px;
        }

        .info h1 {
            font-size: 24px;
            margin: 0;
        }

        .info h2 {
            font-size: 18px;
            font-weight: 400;
            color: rgba(0,0,0,0.6);
            margin: 4px 0;
        }

        .contact-links {
            margin-top: 12px;
            color: #0a66c2; /* LinkedIn 藍 */
            font-weight: 600;
            font-size: 14px;
        }

        /* 內容區塊卡片 */
        section {
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            padding: 24px;
            margin-bottom: 20px;
        }

        section h3 {
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 16px;
        }
